<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 20px 0; background-color: #000000; 
            font-family: 'Inter Tight', sans-serif; color: #FFFFFF;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; overflow-x: hidden;
            letter-spacing: -0.02em;
            font-variant-numeric: proportional-nums;
            -webkit-font-smoothing: antialiased;
        }
        
        .header, .toggle-container {
            width: 95vw; max-width: 1400px;
        }

        .header { text-align: center; margin-bottom: 15px; position: relative; }
        .header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 600; letter-spacing: -0.03em; 
            transition: color 0.4s ease, text-shadow 0.4s ease; 
        }
        .header p { margin: 5px 0 0 0; color: #8E8E93; font-size: 1.1rem; }

        .database-link {
            display: inline-block; margin-top: 15px; padding: 8px 20px;
            background-color: #1C1C1E; color: #8E8E93; border-radius: 100px;
            text-decoration: none; font-size: 0.9rem; font-weight: 600;
            transition: all 0.2s ease;
        }
        .database-link:hover { color: #FFFFFF; background-color: #3A3A3C; }

        .toggle-container {
            display: flex; gap: 5px; background-color: #1C1C1E; 
            padding: 4px; border-radius: 100px; margin-bottom: 12px;
            overflow-x: auto; white-space: nowrap;
            justify-content: center;
            -ms-overflow-style: none; scrollbar-width: none;  
        }
        .toggle-container::-webkit-scrollbar { display: none; }
        
        .toggle-btn {
            background: transparent; border: none; color: #8E8E93;
            font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 0.9rem;
            padding: 8px 16px; border-radius: 100px; cursor: pointer; 
            transition: all 0.2s ease; flex-shrink: 0; 
        }
        
        .time-btn:hover { color: #FFFFFF; }
        .time-btn.active {
            background-color: #3A3A3C; color: #FFFFFF; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .symbol-btn:hover { color: var(--brand-color); background-color: rgba(255, 255, 255, 0.05); }
        .symbol-btn.active {
            background-color: var(--brand-color); color: var(--text-color); 
            box-shadow: 0 0 12.5px var(--brand-color);
        }

        .main-content {
            display: flex;
            width: 95vw; 
            max-width: 1400px;
            gap: 20px;
            align-items: flex-start;
        }

        .chart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0; 
        }

        .legend-container { display: flex; gap: 20px; margin-bottom: 12px; justify-content: flex-start; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .color-square { width: 12px; height: 12px; border-radius: 3px; }
        .legend-text { font-size: 0.9rem; font-weight: 400; color: #FFFFFF; }

        .chart-wrapper { 
            height: 60vh; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05); 
            position: relative; background-color: #111111;
        }

        #native-canvas-chart {
            width: 100%; height: 100%; display: block; cursor: crosshair; touch-action: none;
        }
        
        .chart-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #8E8E93; font-weight: 600; font-size: 1.1rem; display: none; pointer-events: none;
        }

        .side-panel {
            width: 300px;
            background-color: #111111;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex-shrink: 0;
            box-sizing: border-box;
            margin-top: 36px;
        }
        
        .chart-stats { text-align: left; }

        .stat-label {
            color: #8E8E93; font-size: 1rem; font-weight: 600; margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        
        #stat-price {
            font-size: 3rem; font-weight: 600; color: #FFFFFF;
            letter-spacing: -0.04em; margin-bottom: 5px; font-variant-numeric: tabular-nums; 
        }
        
        #stat-change {
            font-size: 1.15rem; font-weight: 600; font-variant-numeric: tabular-nums;
            transition: color 0.1s ease;
        }

        #stat-date { color: #8E8E93; font-size: 0.95rem; margin-top: 10px; font-weight: 400; }
        
        .chart-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; font-size: 0.85rem; color: #8E8E93; font-weight: 400;
        }
        .chart-footer > div { flex: 1; }
        
        #live-clock { text-align: left; color: #FFFFFF; font-weight: 600; }
        #market-countdown { text-align: center; color: #FFFFFF; font-weight: 600; } 
        .chart-footer > div:last-child { text-align: right; color: #FFFFFF; font-weight: 600; }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; align-items: stretch; }
            .side-panel { width: auto; margin-top: 0; padding: 20px; flex-direction: row; justify-content: space-between; align-items: center; }
            .side-panel > div { display: flex; flex-direction: column; }
            #stat-price { font-size: 2.2rem; margin-bottom: 0; }
            #stat-change { font-size: 1rem; }
            #stat-date { margin-top: 0; text-align: right; }
            .chart-wrapper { height: 50vh; }
            .chart-footer { flex-direction: column; align-items: center; gap: 8px; }
            .chart-footer > div { text-align: center !important; }
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h1 id="stock-title" style="color: #E31937; text-shadow: 0px 0px 12.5px #E3193766;">TSLA</h1>
        <p id="market-status">Live Tracking <span style="color: #28C76F; font-weight: 600;">(Market Open)</span></p>
        <a href="atclosehistory.html" class="database-link">View At Close History ▶</a>
    </div>

    <div class="toggle-container">
        <button class="toggle-btn symbol-btn" style="--brand-color: #E31937; --text-color: #FFFFFF;" onclick="setSymbol('TSLA', 'TSLA', '#E31937', this)">TSLA</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #76B900; --text-color: #000000;" onclick="setSymbol('NVDA', 'NVDA', '#76B900', this)">NVDA</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #BFBFBF; --text-color: #000000;" onclick="setSymbol('AAPL', 'AAPL', '#BFBFBF', this)">AAPL</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #00A4EF; --text-color: #000000;" onclick="setSymbol('MSFT', 'MSFT', '#00A4EF', this)">MSFT</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #FF9900; --text-color: #000000;" onclick="setSymbol('AMZN', 'AMZN', '#FF9900', this)">AMZN</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #4285F4; --text-color: #FFFFFF;" onclick="setSymbol('GOOG', 'GOOG', '#4285F4', this)">GOOG</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #0668E1; --text-color: #FFFFFF;" onclick="setSymbol('META', 'META', '#0668E1', this)">META</button>
    </div>

    <div class="toggle-container">
        <button class="toggle-btn time-btn" onclick="setTime('interval', '1', this)">1m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '2', this)">2m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '3', this)">3m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '5', this)">5m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '15', this)">15m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '60', this)">1H</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '240', this)">4H</button>
        
        <button class="toggle-btn time-btn" onclick="setTime('range', '1D', this)">1D</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', '5D', this)">Week</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', '1M', this)">Month</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', 'YTD', this)">YTD</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', 'ALL', this)">Max</button>
    </div>

    <div class="main-content">
        <div class="chart-section">
            <div class="legend-container">
                <div class="legend-item"><div class="color-square" style="background-color: #2863fc;"></div><span class="legend-text">Price Trend</span></div>
                <div class="legend-item"><div class="color-square" style="background-color: #e95448;"></div><span class="legend-text">Demand</span></div>
                <div class="legend-item"><div class="color-square" style="background-color: #30998b;"></div><span class="legend-text">Supply</span></div>
            </div>

            <div class="chart-wrapper">
                <div id="chart-msg-overlay" class="chart-message">Syncing Databases...</div>
                <canvas id="native-canvas-chart"></canvas>
            </div>
            
            <div class="chart-footer">
                <div id="live-clock">Time: --:--:-- --</div>
                <div id="market-countdown">Calculating...</div>
                <div>Central Time Zone (CT)</div>
            </div>
        </div>

        <div class="side-panel">
            <div id="chart-stats-overlay" class="chart-stats" style="display: none;">
                <div class="stat-label" id="stat-ticker-label">TSLA</div>
                <div id="stat-price">---</div>
                <div id="stat-change">---</div>
                <div id="stat-date">---</div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        const INTRADAY_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMXRNvl_MWdY7TDj8bXruKqlFyoulqEc33XWZ1q5tY9rn2rdLSB6F-VqufSwtHup2eLvZwcBA3fX-j/pub?gid=1782241116&single=true&output=csv";
        const MACRO_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMXRNvl_MWdY7TDj8bXruKqlFyoulqEc33XWZ1q5tY9rn2rdLSB6F-VqufSwtHup2eLvZwcBA3fX-j/pub?gid=1692149723&single=true&output=csv";

        let currentSymbolCode = localStorage.getItem('savedSymbolCode') || "TSLA";
        let currentTicker = localStorage.getItem('savedTicker') || "TSLA";
        let currentBrandColor = localStorage.getItem('savedBrandColor') || "#E31937";
        let currentTimeMode = localStorage.getItem('savedTimeMode') || "range"; 
        let currentTimeValue = localStorage.getItem('savedTimeValue') || "1D";
        
        const CHART_COLOR = "#2863fc"; 
        const COLOR_DEMAND = "#e95448"; 
        const COLOR_SUPPLY = "#30998b"; 

        let localMemoryDB = { intraday: {}, macro: {} };
        
        let state = {
            points: [], scaleX: 1, offsetX: 0, isDragging: false,
            startX: 0, hoverIndex: -1, hoverPos: null
        };

        const DOM = {
            clock: document.getElementById('live-clock'),
            countdown: document.getElementById('market-countdown'),
            status: document.getElementById('market-status'),
            title: document.getElementById('stock-title'),
            canvas: document.getElementById('native-canvas-chart'),
            msgOverlay: document.getElementById('chart-msg-overlay'),
            statsOverlay: document.getElementById('chart-stats-overlay'),
            statPrice: document.getElementById('stat-price'),
            statChange: document.getElementById('stat-change'),
            statDate: document.getElementById('stat-date'),
            statTickerLabel: document.getElementById('stat-ticker-label')
        };

        // ==========================================
        // REAL-TIME WEBSOCKET ENGINE (WITH STALE DATA FIREWALL)
        // ==========================================
        let liveSocket = null;
        let lastTickTime = 0;

        function connectLiveStream(ticker) {
            if (liveSocket) {
                liveSocket.send(JSON.stringify({'type':'unsubscribe', 'symbol': currentTicker}));
                liveSocket.close();
            }

            // 🛑 CRITICAL FIX: REPLACE THIS STRING WITH YOUR ACTUAL FINNHUB KEY 🛑
            const API_KEY = "d8ppadpr01qqd60jn7o0d8ppadpr01qqd60jn7og";
            
            liveSocket = new WebSocket(`wss://ws.finnhub.io?token=${API_KEY}`);

            liveSocket.addEventListener('open', function (event) {
                liveSocket.send(JSON.stringify({'type':'subscribe', 'symbol': ticker}));
            });

            liveSocket.addEventListener('message', function (event) {
                const response = JSON.parse(event.data);
                
                if (response.type === 'trade') {
                    const now = Date.now();
                    
                    if (now - lastTickTime > 1000) {
                        lastTickTime = now;
                        
                        const currentPrice = response.data[0].p;
                        const tradeVolume = response.data[0].v * 40; 
                        const dateObj = new Date(response.data[0].t);
                        
                        const offset = dateObj.getTimezoneOffset() * 60000;
                        const localTime = new Date(dateObj.getTime() - offset);
                        const dtStr = localTime.toISOString().replace('T', ' ').substring(0, 19);

                        if (!localMemoryDB.intraday[ticker]) localMemoryDB.intraday[ticker] = [];
                        let intradayArray = localMemoryDB.intraday[ticker];

                        if (intradayArray.length > 0) {
                            let lastPoint = intradayArray[intradayArray.length - 1];
                            let currentMinute = dtStr.substring(0, 16);
                            let lastMinute = lastPoint.timeStr.substring(0, 16);
                            
                            let currentDay = dtStr.substring(0, 10);
                            let lastDay = lastPoint.timeStr.substring(0, 10);

                            // STALE DATA FIREWALL: 
                            // If the incoming live trade is from today, but the array is stuck on yesterday, wipe it clean.
                            if (currentDay !== lastDay) {
                                localMemoryDB.intraday[ticker] = [{ timeStr: dtStr, price: currentPrice, volume: tradeVolume }];
                            } else if (currentMinute === lastMinute) {
                                lastPoint.price = currentPrice;
                                lastPoint.volume += tradeVolume;
                                lastPoint.timeStr = dtStr;
                            } else {
                                localMemoryDB.intraday[ticker].push({ timeStr: dtStr, price: currentPrice, volume: tradeVolume });
                            }
                        } else {
                            localMemoryDB.intraday[ticker].push({ timeStr: dtStr, price: currentPrice, volume: tradeVolume });
                        }

                        const isMacroMode = (currentTimeMode === 'range' && currentTimeValue !== '1D');
                        if (!isMacroMode) loadChartFromMemory();
                    }
                }
            });
        }

        async function bootDataEngine() {
            DOM.msgOverlay.innerText = "Syncing RAM Cache...";
            DOM.msgOverlay.style.display = 'block';
            DOM.statsOverlay.style.display = 'none';

            try {
                const [intraRes, macroRes] = await Promise.all([
                    fetch(INTRADAY_CSV_URL + "&_t=" + Date.now()),
                    fetch(MACRO_CSV_URL + "&_t=" + Date.now())
                ]);

                const intraText = await intraRes.text();
                const macroText = await macroRes.text();

                localMemoryDB.intraday = {};
                localMemoryDB.macro = {};

                parseToMemory(intraText, true);
                parseToMemory(macroText, false);

                DOM.msgOverlay.style.display = 'none';
                loadChartFromMemory(); 
                
            } catch (err) {
                console.error("Database sync failed:", err);
                DOM.msgOverlay.innerText = "Database connection offline.";
            }
        }

        function parseToMemory(csvText, isIntraday) {
            const lines = csvText.split(/\r?\n/);
            for(let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (isIntraday && cols.length >= 3) {
                    const symbol = cols[1].replace(/['"]/g, '').trim();
                    const dtStr = cols[0].replace(/['"]/g, '').trim();
                    const price = parseFloat(cols[2]);
                    const volume = cols.length >= 4 ? parseFloat(cols[3]) || 0 : 0;
                    
                    if (!isNaN(price)) {
                        if(!localMemoryDB.intraday[symbol]) localMemoryDB.intraday[symbol] = [];
                        localMemoryDB.intraday[symbol].push({ timeStr: dtStr, price: price, volume: volume });
                    }
                } else if (!isIntraday && cols.length >= 4) {
                    const symbol = cols[1].replace(/['"]/g, '').trim();
                    const timeframe = cols[2].replace(/['"]/g, '').trim();
                    const dtStr = cols[0].replace(/['"]/g, '').trim();
                    const price = parseFloat(cols[3]);
                    const volume = cols.length >= 5 ? parseFloat(cols[4]) || 0 : 0;
                    
                    if (!isNaN(price)) {
                        if(!localMemoryDB.macro[symbol]) localMemoryDB.macro[symbol] = {};
                        if(!localMemoryDB.macro[symbol][timeframe]) localMemoryDB.macro[symbol][timeframe] = [];
                        localMemoryDB.macro[symbol][timeframe].push({ timeStr: dtStr, price: price, volume: volume });
                    }
                }
            }
        }

        function setSymbol(symbolCode, symbolName, brandColor, clickedButton) {
            if (clickedButton) {
                document.querySelectorAll('.symbol-btn').forEach(btn => btn.classList.remove('active'));
                clickedButton.classList.add('active');
            }
            currentSymbolCode = symbolCode;
            currentTicker = symbolName;
            currentBrandColor = brandColor;
            
            localStorage.setItem('savedSymbolCode', symbolCode);
            localStorage.setItem('savedTicker', symbolName);
            localStorage.setItem('savedBrandColor', brandColor);
            
            DOM.title.innerText = symbolName; 
            DOM.title.style.color = brandColor;
            DOM.title.style.textShadow = `0px 0px 12.5px ${brandColor}66`;
            
            resetPanZoom();
            loadChartFromMemory(); 
            connectLiveStream(symbolName);
        }

        function setTime(mode, value, clickedButton) {
            if (clickedButton) {
                document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
                clickedButton.classList.add('active');
            }
            currentTimeMode = mode;
            currentTimeValue = value;
            
            localStorage.setItem('savedTimeMode', mode);
            localStorage.setItem('savedTimeValue', value);
            
            resetPanZoom();
            loadChartFromMemory(); 
        }

        function resetPanZoom() {
            state.scaleX = 1;
            state.offsetX = 0;
            state.hoverIndex = -1;
        }

        function initializeTerminal() {
            document.querySelectorAll('.symbol-btn').forEach(btn => {
                if (btn.innerText === currentTicker) {
                    btn.classList.add('active');
                    DOM.title.style.color = currentBrandColor;
                    DOM.title.style.textShadow = `0px 0px 12.5px ${currentBrandColor}66`;
                }
            });
            document.querySelectorAll('.time-btn').forEach(btn => {
                const clickAttr = btn.getAttribute('onclick');
                if (clickAttr.includes(`'${currentTimeMode}'`) && clickAttr.includes(`'${currentTimeValue}'`)) {
                    btn.classList.add('active');
                }
            });
            
            DOM.title.innerText = currentTicker;
            window.addEventListener('resize', () => { if(state.points.length > 0) renderCanvas(); });
            setupCanvasInteractions();
            bootDataEngine(); 
            connectLiveStream(currentTicker);
        }

        function loadChartFromMemory() {
            const isMacroMode = (currentTimeMode === 'range' && currentTimeValue !== '1D');
            let coords = [];

            if (isMacroMode) {
                if(localMemoryDB.macro[currentTicker] && localMemoryDB.macro[currentTicker][currentTimeValue]) {
                    coords = [...localMemoryDB.macro[currentTicker][currentTimeValue]];
                }
            } else {
                if(localMemoryDB.intraday[currentTicker]) {
                    coords = [...localMemoryDB.intraday[currentTicker]];
                    if (currentTimeMode === 'interval') {
                        const step = parseInt(currentTimeValue);
                        if (step > 1) {
                            coords = coords.filter((_, idx) => idx % step === 0);
                        }
                    }
                }
            }

            if (coords.length === 0) {
                DOM.msgOverlay.innerText = `No ${isMacroMode ? currentTimeValue : 'live'} data found for ${currentTicker}.`;
                DOM.msgOverlay.style.display = 'block';
                DOM.statsOverlay.style.display = 'none';
                clearCanvas();
                state.points = [];
                return;
            }

            DOM.msgOverlay.style.display = 'none';
            state.points = coords;
            renderCanvas();
        }

        function formatTimeString(timeStr, isAxis = false) {
            const isMacroMode = (currentTimeMode === 'range' && currentTimeValue !== '1D');
            const parts = timeStr.split(' ');
            
            if (!isMacroMode) {
                if (parts.length > 1) {
                    if (isAxis) return parts[1].substring(0, 5); 
                    const dateParts = parts[0].split('-');
                    return `${dateParts[1]}/${dateParts[2]}/${dateParts[0]} ${parts[1].substring(0,5)}`; 
                }
                return timeStr;
            } else if (currentTimeValue === '5D' || currentTimeValue === '1M') {
                if (parts.length > 1) {
                    const dateParts = parts[0].split('-');
                    return `${dateParts[1]}/${dateParts[2]} ${parts[1].substring(0,5)}`;
                }
            } else {
                return parts[0];
            }
            return timeStr;
        }

        function setupCanvasInteractions() {
            const cvs = DOM.canvas;
            
            cvs.addEventListener('wheel', (e) => {
                e.preventDefault();
                if(state.points.length === 0) return;
                
                const zoomSensitivity = 0.001;
                const zoomFactor = 1 - (e.deltaY * zoomSensitivity);
                
                state.scaleX *= zoomFactor;
                if (state.scaleX < 1) state.scaleX = 1; 
                if (state.scaleX > 30) state.scaleX = 30; 
                
                const rect = cvs.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - 20; 
                state.offsetX = mouseX - (mouseX - state.offsetX) * zoomFactor;
                
                clampPan();
                requestAnimationFrame(renderCanvas);
            });

            cvs.addEventListener('mousedown', (e) => {
                if(state.points.length === 0) return;
                state.isDragging = true;
                state.startX = e.clientX - state.offsetX;
            });
            
            window.addEventListener('mouseup', () => { state.isDragging = false; });
            
            cvs.addEventListener('mousemove', (e) => {
                if(state.points.length === 0) return;
                const rect = cvs.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                if (state.isDragging) {
                    state.offsetX = e.clientX - state.startX;
                    clampPan();
                }

                if (state.points.length > 0) {
                    const paddingLeft = 20;
                    const graphWidth = rect.width - paddingLeft - 65;
                    const rawGraphX = (mouseX - paddingLeft - state.offsetX) / state.scaleX;
                    const indexFloat = (rawGraphX / graphWidth) * (state.points.length - 1);
                    
                    let closestIdx = Math.round(indexFloat);
                    if (closestIdx < 0) closestIdx = 0;
                    if (closestIdx >= state.points.length) closestIdx = state.points.length - 1;
                    
                    if (mouseX >= paddingLeft && mouseX <= rect.width - 65) {
                        state.hoverIndex = closestIdx;
                        state.hoverPos = { x: mouseX, y: mouseY };
                    } else {
                        state.hoverIndex = -1;
                    }
                }
                
                requestAnimationFrame(renderCanvas);
            });

            cvs.addEventListener('mouseleave', () => {
                state.hoverIndex = -1;
                requestAnimationFrame(renderCanvas);
            });

            cvs.addEventListener('touchstart', (e) => {
                if(state.points.length === 0) return;
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.startX = e.touches[0].clientX - state.offsetX;
                }
            });
            cvs.addEventListener('touchmove', (e) => {
                if(state.points.length === 0) return;
                if (state.isDragging && e.touches.length === 1) {
                    state.offsetX = e.touches[0].clientX - state.startX;
                    clampPan();
                    requestAnimationFrame(renderCanvas);
                }
            });
            cvs.addEventListener('touchend', () => { state.isDragging = false; });
        }

        function clampPan() {
            const maxOffset = 0;
            const minOffset = -((state.scaleX - 1) * (DOM.canvas.getBoundingClientRect().width - 85));
            if (state.offsetX > maxOffset) state.offsetX = maxOffset;
            if (state.offsetX < minOffset) state.offsetX = minOffset;
        }

        function clearCanvas() {
            const ctx = DOM.canvas.getContext('2d');
            ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
        }

        function renderCanvas() {
            if (state.points.length === 0) return;

            let displayIdx = (state.hoverIndex !== -1) ? state.hoverIndex : state.points.length - 1;
            const activeData = state.points[displayIdx];
            const startPriceData = state.points[0].price;
            
            const priceDiff = activeData.price - startPriceData;
            const percentDiff = (priceDiff / startPriceData) * 100;
            
            DOM.statsOverlay.style.display = 'block';
            DOM.statTickerLabel.innerText = currentTicker;
            DOM.statPrice.innerText = `$${activeData.price.toFixed(2)}`;
            
            const sign = priceDiff >= 0 ? '+' : '';
            const changeColor = priceDiff >= 0 ? '#28C76F' : '#E31937'; 
            
            DOM.statChange.innerText = `${sign}$${Math.abs(priceDiff).toFixed(2)} (${sign}${Math.abs(percentDiff).toFixed(2)}%)`;
            DOM.statChange.style.color = changeColor;

            const timeLabel = formatTimeString(activeData.timeStr, false);
            DOM.statDate.innerText = timeLabel;

            const canvas = DOM.canvas;
            const ctx = canvas.getContext('2d');
            
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            
            const width = rect.width;
            const height = rect.height;
            
            const paddingRight = 65;
            const paddingBottom = 30;
            const paddingTop = 20;
            const paddingLeft = 20;
            
            const prices = state.points.map(p => p.price);
            const rawMax = Math.max(...prices);
            const rawMin = Math.min(...prices);
            
            let maxPrice, minPrice;
            if (rawMax === rawMin) {
                maxPrice = rawMax * 1.05;
                minPrice = Math.max(0, rawMin * 0.95);
            } else {
                const rangePadding = (rawMax - rawMin) * 0.12; 
                maxPrice = rawMax + rangePadding;
                minPrice = Math.max(0, rawMin - rangePadding); 
            }
            const priceRange = maxPrice - minPrice;
            
            const graphWidth = width - paddingLeft - paddingRight;
            const graphHeight = height - paddingTop - paddingBottom;
            
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, width, height);
            
            ctx.strokeStyle = '#1C1C1E';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#8E8E93';
            ctx.font = "600 11px 'Inter Tight'";
            ctx.textAlign = 'left';
            
            const gridLines = 4;
            for(let i = 0; i <= gridLines; i++) {
                const ratio = i / gridLines;
                const y = paddingTop + (graphHeight * (1 - ratio));
                const currentPriceVal = minPrice + (priceRange * ratio);
                
                ctx.beginPath();
                ctx.moveTo(paddingLeft, y);
                ctx.lineTo(width - paddingRight, y);
                ctx.stroke();
                
                ctx.fillText(`$${currentPriceVal.toFixed(2)}`, width - paddingRight + 10, y + 4);
            }
            
            let renderCoords = [];
            for(let i = 0; i < state.points.length; i++) {
                const xRatio = i / (state.points.length - 1);
                const x = paddingLeft + (xRatio * graphWidth * state.scaleX) + state.offsetX;
                const yRatio = (state.points.length === 1) ? 0.5 : (state.points[i].price - minPrice) / priceRange;
                const y = paddingTop + (graphHeight * (1 - yRatio));
                renderCoords.push({ x: x, y: y, rawIdx: i });
            }
            
            const visibleCoords = renderCoords.filter(pt => pt.x >= paddingLeft - 10 && pt.x <= width - paddingRight + 10);
            if (visibleCoords.length === 0) return;

            ctx.save();
            ctx.beginPath();
            ctx.rect(paddingLeft, paddingTop, graphWidth, graphHeight);
            ctx.clip();

            const visibleVolumes = visibleCoords.map(pt => state.points[pt.rawIdx].volume || 0);
            const maxVolume = Math.max(...visibleVolumes, 1);
            
            const maxVolHeight = graphHeight * 0.25; 
            const barWidth = Math.max(1, (graphWidth / state.points.length) * state.scaleX * 0.6);

            for(let i = 0; i < visibleCoords.length; i++) {
                const pt = visibleCoords[i];
                const rawIdx = pt.rawIdx;
                const currentData = state.points[rawIdx];
                
                let isDemand = true; 
                if (rawIdx > 0) {
                    isDemand = currentData.price >= state.points[rawIdx - 1].price;
                }

                const volHeight = (currentData.volume / maxVolume) * maxVolHeight;
                const barY = paddingTop + graphHeight - volHeight;

                ctx.fillStyle = isDemand ? COLOR_DEMAND : COLOR_SUPPLY;
                ctx.globalAlpha = 0.4; 
                ctx.fillRect(pt.x - (barWidth / 2), barY, barWidth, volHeight);
            }
            ctx.globalAlpha = 1.0;

            ctx.beginPath();
            ctx.moveTo(visibleCoords[0].x, paddingTop + graphHeight);
            for(const pt of visibleCoords) {
                ctx.lineTo(pt.x, pt.y);
            }
            ctx.lineTo(visibleCoords[visibleCoords.length - 1].x, paddingTop + graphHeight);
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(0, paddingTop, 0, paddingTop + graphHeight);
            gradient.addColorStop(0, `${CHART_COLOR}33`); 
            gradient.addColorStop(1, `${CHART_COLOR}00`); 
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(visibleCoords[0].x, visibleCoords[0].y);
            for(let i = 1; i < visibleCoords.length; i++) {
                ctx.lineTo(visibleCoords[i].x, visibleCoords[i].y);
            }
            ctx.strokeStyle = CHART_COLOR;
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            if (state.hoverIndex !== -1 && renderCoords[state.hoverIndex]) {
                const activePt = renderCoords[state.hoverIndex];
                
                ctx.beginPath();
                ctx.moveTo(activePt.x, paddingTop);
                ctx.lineTo(activePt.x, paddingTop + graphHeight);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.beginPath();
                ctx.arc(activePt.x, activePt.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = CHART_COLOR;
                ctx.fill();
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.restore(); 

            ctx.fillStyle = '#8E8E93';
            ctx.textAlign = 'center';
            ctx.font = "600 11px 'Inter Tight'";
            
            const numLabels = 6; 
            for(let i = 0; i <= numLabels; i++) {
                const visibleRatio = i / numLabels;
                const targetScreenX = paddingLeft + (visibleRatio * graphWidth);
                const targetDataRatio = ((targetScreenX - paddingLeft - state.offsetX) / state.scaleX) / graphWidth;
                
                let dataIdx = Math.round(targetDataRatio * (state.points.length - 1));
                
                if (dataIdx >= 0 && dataIdx < state.points.length) {
                    const timeLabel = formatTimeString(state.points[dataIdx].timeStr, true);
                    ctx.fillText(timeLabel, targetScreenX, height - 10);
                }
            }
        }

        function getDayStatus(y, m, d) {
            const dateObj = new Date(y, m - 1, d);
            const dayOfWeek = dateObj.getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) return { isOpen: false, closeTime: 0, reason: "Weekend" };

            let nyd = new Date(y, 0, 1);
            let nydObserved = nyd.getDay() === 0 ? new Date(y, 0, 2) : (nyd.getDay() === 6 ? null : nyd);
            
            let mlk = new Date(y, 0, 1); mlk.setDate(1 + (8 - mlk.getDay()) % 7 + 14);
            let pres = new Date(y, 1, 1); pres.setDate(1 + (8 - pres.getDay()) % 7 + 14);
            
            const a = y % 19, b = Math.floor(y / 100), c = y % 100, d1 = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d1 - g + 15) % 30, i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7, m1 = Math.floor((a + 11 * h + 22 * l) / 451), emonth = Math.floor((h + l - 7 * m1 + 114) / 31) - 1, eday = ((h + l - 7 * m1 + 114) % 31) + 1;
            let gf = new Date(y, emonth, eday); gf.setDate(gf.getDate() - 2);
            
            let mem = new Date(y, 5, 0); mem.setDate(mem.getDate() - (mem.getDay() === 0 ? 6 : mem.getDay() - 1));
            
            let jte = new Date(y, 5, 19);
            let jteObserved = jte.getDay() === 0 ? new Date(y, 5, 20) : (jte.getDay() === 6 ? new Date(y, 5, 18) : jte);
            
            let ind = new Date(y, 6, 4);
            let indObserved = ind.getDay() === 0 ? new Date(y, 6, 5) : (ind.getDay() === 6 ? new Date(y, 6, 3) : ind);
            
            let lab = new Date(y, 8, 1); lab.setDate(1 + (8 - lab.getDay()) % 7);
            let txg = new Date(y, 10, 1); txg.setDate(1 + (11 - txg.getDay()) % 7 + 21);
            
            let chr = new Date(y, 11, 25);
            let chrObserved = chr.getDay() === 0 ? new Date(y, 11, 26) : (chr.getDay() === 6 ? new Date(y, 11, 24) : chr);

            const holidays = [nydObserved, mlk, pres, gf, mem, jteObserved, indObserved, lab, txg, chrObserved].filter(Boolean);
            const isHoliday = holidays.some(h => h.getMonth() === m - 1 && h.getDate() === d);
            if (isHoliday) return { isOpen: false, closeTime: 0, reason: "Holiday" };

            let isEarlyClose = false;
            let bf = new Date(txg); bf.setDate(bf.getDate() + 1);
            if (m - 1 === bf.getMonth() && d === bf.getDate()) isEarlyClose = true;
            if (m === 12 && d === 24 && dayOfWeek >= 1 && dayOfWeek <= 4) isEarlyClose = true;
            if (m === 7 && d === 3 && (ind.getDay() >= 2 && ind.getDay() <= 5)) isEarlyClose = true;

            return { isOpen: true, closeTime: isEarlyClose ? 13 * 60 : 16 * 60, reason: "Open" };
        }

        function updateClockAndStatus() {
            const now = new Date();
            
            const ctOptions = { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            DOM.clock.innerText = `Time: ${now.toLocaleTimeString('en-US', ctOptions)}`;

            const formatter = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', hour12: false });
            const parts = formatter.formatToParts(now);
            const p = {}; parts.forEach(pt => p[pt.type] = parseInt(pt.value));
            
            if (p.hour === 24) p.hour = 0; 

            const currentMins = p.hour * 60 + p.minute;
            const openMins = 9 * 60 + 30; 
            
            let currentStatus = getDayStatus(p.year, p.month, p.day);
            let isMarketOpen = false;
            let countdownText = "";
            
            if (currentStatus.isOpen && currentMins >= openMins && currentMins < currentStatus.closeTime) {
                isMarketOpen = true;
                let diff = currentStatus.closeTime - currentMins;
                let hrs = Math.floor(diff / 60);
                let mins = diff % 60;
                countdownText = `Market closes in ${hrs > 0 ? hrs + 'h ' : ''}${mins}m`;
                DOM.status.innerHTML = `Live Tracking <span style="color: #28C76F; font-weight: 600;">(Market Open)</span>`;
            } else {
                if (!currentStatus.isOpen) {
                    DOM.status.innerHTML = `Live Tracking <span style="color: #BFBFBF; font-weight: 600;">(Market Closed - ${currentStatus.reason})</span>`;
                } else {
                    DOM.status.innerHTML = `Live Tracking <span style="color: #BFBFBF; font-weight: 600;">(Market Closed)</span>`;
                }
                
                let foundOpen = false;
                let minutesUntilOpen = 0;
                
                if (currentStatus.isOpen && currentMins < openMins) {
                    foundOpen = true;
                    minutesUntilOpen = openMins - currentMins;
                } else {
                    let checkDate = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
                    let daysAdded = 0;
                    while (!foundOpen && daysAdded < 14) {
                        checkDate.setDate(checkDate.getDate() + 1);
                        daysAdded++;
                        let status = getDayStatus(checkDate.getFullYear(), checkDate.getMonth() + 1, checkDate.getDate());
                        if (status.isOpen) {
                            foundOpen = true;
                            let minsToMidnight = (24 * 60) - currentMins;
                            minutesUntilOpen = minsToMidnight + ((daysAdded - 1) * 24 * 60) + openMins;
                        }
                    }
                }
                
                if (foundOpen) {
                    let d = Math.floor(minutesUntilOpen / (24 * 60));
                    let h = Math.floor((minutesUntilOpen % (24 * 60)) / 60);
                    let m = minutesUntilOpen % 60;
                    
                    let timeString = "";
                    if (d > 0) timeString += `${d}d `;
                    if (h > 0 || d > 0) timeString += `${h}h `;
                    timeString += `${m}m`;
                    
                    countdownText = `Market opens in ${timeString.trim()}`;
                } else {
                    countdownText = `Market closed`;
                }
            }
            DOM.countdown.innerText = countdownText;
        }

        setInterval(updateClockAndStatus, 1000);
        initializeTerminal();
        updateClockAndStatus(); 
    </script>
