<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 20px 0; background-color: #000000; 
            font-family: 'Inter Tight', sans-serif; color: #FFFFFF;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; overflow-x: hidden;
            letter-spacing: -0.02em;
            font-variant-numeric: proportional-nums;
            -webkit-font-smoothing: antialiased;
        }
        
        .header, .toggle-container, .legend-container, .chart-wrapper, .chart-footer {
            width: 95vw; max-width: 1400px;
        }

        .header { text-align: center; margin-bottom: 15px; position: relative; }
        .header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 600; letter-spacing: -0.03em; 
            transition: color 0.4s ease, text-shadow 0.4s ease; 
        }
        .header p { margin: 5px 0 0 0; color: #8E8E93; font-size: 1.1rem; }

        .database-link {
            display: inline-block; margin-top: 15px; padding: 8px 20px;
            background-color: #1C1C1E; color: #8E8E93; border-radius: 100px;
            text-decoration: none; font-size: 0.9rem; font-weight: 600;
            transition: all 0.2s ease;
        }
        .database-link:hover { color: #FFFFFF; background-color: #3A3A3C; }

        .toggle-container {
            display: flex; gap: 5px; background-color: #1C1C1E; 
            padding: 4px; border-radius: 100px; margin-bottom: 12px;
            overflow-x: auto; white-space: nowrap;
            justify-content: center;
            -ms-overflow-style: none; scrollbar-width: none;  
        }
        .toggle-container::-webkit-scrollbar { display: none; }
        
        .toggle-btn {
            background: transparent; border: none; color: #8E8E93;
            font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 0.9rem;
            padding: 8px 16px; border-radius: 100px; cursor: pointer; 
            transition: all 0.2s ease; flex-shrink: 0; 
        }
        
        .time-btn:hover { color: #FFFFFF; }
        .time-btn.active {
            background-color: #3A3A3C; color: #FFFFFF; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .symbol-btn:hover { color: var(--brand-color); background-color: rgba(255, 255, 255, 0.05); }
        .symbol-btn.active {
            background-color: var(--brand-color); color: var(--text-color); 
            box-shadow: 0 0 12.5px var(--brand-color);
        }

        .legend-container { display: flex; gap: 20px; margin-bottom: 12px; justify-content: flex-start; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .color-square { width: 12px; height: 12px; border-radius: 3px; }
        .legend-text { font-size: 0.9rem; font-weight: 400; color: #FFFFFF; }

        .chart-wrapper { 
            height: 60vh; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05); 
            position: relative; background-color: #111111;
        }
        
        #native-canvas-chart {
            width: 100%; height: 100%; display: block; cursor: crosshair; touch-action: none;
        }
        
        .chart-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #8E8E93; font-weight: 600; font-size: 1.1rem; display: none; pointer-events: none;
        }
        
        .chart-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; font-size: 0.85rem; color: #8E8E93; font-weight: 400;
        }
        .chart-footer > div { flex: 1; }
        
        /* Applied JetBrains Mono to all data-heavy footer elements */
        #live-clock { text-align: left; color: #FFFFFF; font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 0.9rem; }
        #market-countdown { text-align: center; color: #FFFFFF; font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 0.9rem; } 
        .chart-footer > div:last-child { text-align: right; color: #FFFFFF; font-weight: 600; }

        @media (max-width: 800px) {
            .chart-wrapper { height: 50vh; }
            .chart-footer { flex-direction: column; align-items: center; gap: 8px; }
            .chart-footer > div { text-align: center !important; }
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h1 id="stock-title" style="color: #E31937; text-shadow: 0px 0px 12.5px #E3193766;">TSLA</h1>
        <p id="market-status">Live Tracking <span style="color: #28C76F; font-weight: 600;">(Market Open)</span></p>
        <a href="atclosehistory.html" class="database-link">View At Close History ▶</a>
    </div>

    <div class="toggle-container">
        <button class="toggle-btn symbol-btn" style="--brand-color: #E31937; --text-color: #FFFFFF;" onclick="setSymbol('TSLA', 'TSLA', '#E31937', this)">TSLA</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #76B900; --text-color: #000000;" onclick="setSymbol('NVDA', 'NVDA', '#76B900', this)">NVDA</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #BFBFBF; --text-color: #000000;" onclick="setSymbol('AAPL', 'AAPL', '#BFBFBF', this)">AAPL</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #00A4EF; --text-color: #000000;" onclick="setSymbol('MSFT', 'MSFT', '#00A4EF', this)">MSFT</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #FF9900; --text-color: #000000;" onclick="setSymbol('AMZN', 'AMZN', '#FF9900', this)">AMZN</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #4285F4; --text-color: #FFFFFF;" onclick="setSymbol('GOOG', 'GOOG', '#4285F4', this)">GOOG</button>
        <button class="toggle-btn symbol-btn" style="--brand-color: #0668E1; --text-color: #FFFFFF;" onclick="setSymbol('META', 'META', '#0668E1', this)">META</button>
    </div>

    <div class="toggle-container">
        <button class="toggle-btn time-btn" onclick="setTime('interval', '1', this)">1m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '2', this)">2m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '3', this)">3m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '5', this)">5m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '15', this)">15m</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '60', this)">1H</button>
        <button class="toggle-btn time-btn" onclick="setTime('interval', '240', this)">4H</button>
        
        <button class="toggle-btn time-btn" onclick="setTime('range', '1D', this)">1D</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', '5D', this)">Week</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', '1M', this)">Month</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', 'YTD', this)">YTD</button>
        <button class="toggle-btn time-btn" onclick="setTime('range', 'ALL', this)">Max</button>
    </div>

    <div class="legend-container">
        <div class="legend-item"><div class="color-square" style="background-color: #2863fc;"></div><span class="legend-text">Price Trend</span></div>
        <div class="legend-item"><div class="color-square" style="background-color: #e95448;"></div><span class="legend-text">Demand</span></div>
        <div class="legend-item"><div class="color-square" style="background-color: #30998b;"></div><span class="legend-text">Supply</span></div>
    </div>

    <div class="chart-wrapper">
        <div id="chart-msg-overlay" class="chart-message">Connecting to Cloud Database...</div>
        <canvas id="native-canvas-chart"></canvas>
    </div>
    
    <div class="chart-footer">
        <div id="live-clock">Time: --:--:-- --</div>
        <div id="market-countdown">Calculating...</div>
        <div>Central Time Zone (CT)</div>
    </div>

    <script type="text/javascript">
        // Awaiting your MacroHistory CSV link here! Once you generate it, we will add the routing logic.
        const INTRADAY_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMXRNvl_MWdY7TDj8bXruKqlFyoulqEc33XWZ1q5tY9rn2rdLSB6F-VqufSwtHup2eLvZwcBA3fX-j/pub?gid=1782241116&single=true&output=csv";

        let currentSymbolCode = localStorage.getItem('savedSymbolCode') || "TSLA";
        let currentTicker = localStorage.getItem('savedTicker') || "TSLA";
        let currentBrandColor = localStorage.getItem('savedBrandColor') || "#E31937";
        let currentTimeMode = localStorage.getItem('savedTimeMode') || "range"; 
        let currentTimeValue = localStorage.getItem('savedTimeValue') || "1D";

        const CHART_COLOR = "#2863fc"; 
        
        let state = {
            points: [],
            scaleX: 1,
            offsetX: 0,
            isDragging: false,
            startX: 0,
            hoverIndex: -1,
            hoverPos: null
        };

        const DOM = {
            clock: document.getElementById('live-clock'),
            countdown: document.getElementById('market-countdown'),
            status: document.getElementById('market-status'),
            title: document.getElementById('stock-title'),
            canvas: document.getElementById('native-canvas-chart'),
            msgOverlay: document.getElementById('chart-msg-overlay')
        };

        function setSymbol(symbolCode, symbolName, brandColor, clickedButton) {
            if (clickedButton) {
                document.querySelectorAll('.symbol-btn').forEach(btn => btn.classList.remove('active'));
                clickedButton.classList.add('active');
            }
            currentSymbolCode = symbolCode;
            currentTicker = symbolName;
            currentBrandColor = brandColor;
            
            localStorage.setItem('savedSymbolCode', symbolCode);
            localStorage.setItem('savedTicker', symbolName);
            localStorage.setItem('savedBrandColor', brandColor);
            
            DOM.title.innerText = symbolName; 
            DOM.title.style.color = brandColor;
            DOM.title.style.textShadow = `0px 0px 12.5px ${brandColor}66`;
            
            renderChart();
        }

        function setTime(mode, value, clickedButton) {
            if (clickedButton) {
                document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
                clickedButton.classList.add('active');
            }
            currentTimeMode = mode;
            currentTimeValue = value;
            
            localStorage.setItem('savedTimeMode', mode);
            localStorage.setItem('savedTimeValue', value);
            
            state.scaleX = 1;
            state.offsetX = 0;
            
            renderChart();
        }

        function initializeTerminal() {
            document.querySelectorAll('.symbol-btn').forEach(btn => {
                if (btn.innerText === currentTicker) {
                    btn.classList.add('active');
                    DOM.title.style.color = currentBrandColor;
                    DOM.title.style.textShadow = `0px 0px 12.5px ${currentBrandColor}66`;
                }
            });
            document.querySelectorAll('.time-btn').forEach(btn => {
                const clickAttr = btn.getAttribute('onclick');
                if (clickAttr.includes(`'${currentTimeMode}'`) && clickAttr.includes(`'${currentTimeValue}'`)) {
                    btn.classList.add('active');
                }
            });
            
            DOM.title.innerText = currentTicker;
            window.addEventListener('resize', () => { if(state.points.length > 0) renderCanvas(); });
            setupCanvasInteractions();
            renderChart();
        }

        function renderChart() {
            const isMacroMode = (currentTimeMode === 'range' && currentTimeValue !== '1D');
            
            if (isMacroMode) {
                state.points = [];
                clearCanvas();
                DOM.msgOverlay.innerText = `Connecting to Macro Database for ${currentTimeValue}... (Awaiting CSV Setup)`;
                DOM.msgOverlay.style.display = 'block';
            } else {
                fetchAndDrawNativeData();
            }
        }

        async function fetchAndDrawNativeData() {
            DOM.msgOverlay.innerText = "Connecting to Cloud Database...";
            DOM.msgOverlay.style.display = 'block';
            
            try {
                const res = await fetch(INTRADAY_CSV_URL + "&_t=" + Date.now());
                const text = await res.text();
                
                const lines = text.split(/\r?\n/);
                let coords = [];
                
                for(let i = 1; i < lines.length; i++) {
                    const columns = lines[i].split(',');
                    if (columns.length < 3) continue;
                    
                    const symbol = columns[1].replace(/['"]/g, '').trim();
                    if (symbol === currentTicker) {
                        const datetimeStr = columns[0].replace(/['"]/g, '').trim();
                        const price = parseFloat(columns[2]);
                        if (!isNaN(price)) {
                            coords.push({ timeStr: datetimeStr, price: price });
                        }
                    }
                }
                
                if (coords.length === 0) {
                    DOM.msgOverlay.innerText = `No live data inside tab for ${currentTicker} yet today.`;
                    clearCanvas();
                    return;
                }
                
                if (currentTimeMode === 'interval') {
                    const step = parseInt(currentTimeValue);
                    if (step > 1) {
                        coords = coords.filter((_, idx) => idx % step === 0);
                    }
                }
                
                DOM.msgOverlay.style.display = 'none';
                state.points = coords;
                renderCanvas();
                
            } catch (err) {
                console.error(err);
                DOM.msgOverlay.innerText = "Database connection offline. Retrying...";
            }
        }

        function setupCanvasInteractions() {
            const cvs = DOM.canvas;
            
            cvs.addEventListener('wheel', (e) => {
                e.preventDefault();
                if(state.points.length === 0) return;
                
                const zoomSensitivity = 0.001;
                const zoomFactor = 1 - (e.deltaY * zoomSensitivity);
                
                state.scaleX *= zoomFactor;
                if (state.scaleX < 1) state.scaleX = 1; 
                if (state.scaleX > 20) state.scaleX = 20; 
                
                const rect = cvs.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - 20; 
                state.offsetX = mouseX - (mouseX - state.offsetX) * zoomFactor;
                
                clampPan();
                requestAnimationFrame(renderCanvas);
            });

            cvs.addEventListener('mousedown', (e) => {
                if(state.points.length === 0) return;
                state.isDragging = true;
                state.startX = e.clientX - state.offsetX;
            });
            
            window.addEventListener('mouseup', () => { state.isDragging = false; });
            
            cvs.addEventListener('mousemove', (e) => {
                if(state.points.length === 0) return;
                const rect = cvs.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                if (state.isDragging) {
                    state.offsetX = e.clientX - state.startX;
                    clampPan();
                }

                if (state.points.length > 0) {
                    const paddingLeft = 20;
                    const graphWidth = rect.width - paddingLeft - 65;
                    const rawGraphX = (mouseX - paddingLeft - state.offsetX) / state.scaleX;
                    const indexFloat = (rawGraphX / graphWidth) * (state.points.length - 1);
                    
                    let closestIdx = Math.round(indexFloat);
                    if (closestIdx < 0) closestIdx = 0;
                    if (closestIdx >= state.points.length) closestIdx = state.points.length - 1;
                    
                    if (mouseX >= paddingLeft && mouseX <= rect.width - 65) {
                        state.hoverIndex = closestIdx;
                        state.hoverPos = { x: mouseX, y: mouseY };
                    } else {
                        state.hoverIndex = -1;
                    }
                }
                
                requestAnimationFrame(renderCanvas);
            });

            cvs.addEventListener('mouseleave', () => {
                state.hoverIndex = -1;
                requestAnimationFrame(renderCanvas);
            });

            cvs.addEventListener('touchstart', (e) => {
                if(state.points.length === 0) return;
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.startX = e.touches[0].clientX - state.offsetX;
                }
            });
            cvs.addEventListener('touchmove', (e) => {
                if(state.points.length === 0) return;
                if (state.isDragging && e.touches.length === 1) {
                    state.offsetX = e.touches[0].clientX - state.startX;
                    clampPan();
                    requestAnimationFrame(renderCanvas);
                }
            });
            cvs.addEventListener('touchend', () => { state.isDragging = false; });
        }

        function clampPan() {
            const maxOffset = 0;
            const minOffset = -((state.scaleX - 1) * (DOM.canvas.getBoundingClientRect().width - 85));
            if (state.offsetX > maxOffset) state.offsetX = maxOffset;
            if (state.offsetX < minOffset) state.offsetX = minOffset;
        }

        function clearCanvas() {
            const ctx = DOM.canvas.getContext('2d');
            ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
        }

        function renderCanvas() {
            if (state.points.length === 0) return;
            
            const canvas = DOM.canvas;
            const ctx = canvas.getContext('2d');
            
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            
            const width = rect.width;
            const height = rect.height;
            
            const paddingRight = 65;
            const paddingBottom = 30;
            const paddingTop = 20;
            const paddingLeft = 20;
            
            const graphWidth = width - paddingLeft - paddingRight;
            const graphHeight = height - paddingTop - paddingBottom;
            
            const prices = state.points.map(p => p.price);
            const maxPrice = Math.max(...prices) * 1.002;
            const minPrice = Math.min(...prices) * 0.998;
            const priceRange = maxPrice - minPrice;
            
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, width, height);
            
            // Replaced default UI font with JetBrains Mono for the Grid Matrix
            ctx.strokeStyle = '#1C1C1E';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#8E8E93';
            ctx.font = "600 11px 'JetBrains Mono', monospace";
            ctx.textAlign = 'left';
            
            const gridLines = 4;
            for(let i = 0; i <= gridLines; i++) {
                const ratio = i / gridLines;
                const y = paddingTop + (graphHeight * (1 - ratio));
                const currentPriceVal = minPrice + (priceRange * ratio);
                
                ctx.beginPath();
                ctx.moveTo(paddingLeft, y);
                ctx.lineTo(width - paddingRight, y);
                ctx.stroke();
                
                ctx.fillText(`$${currentPriceVal.toFixed(2)}`, width - paddingRight + 10, y + 4);
            }
            
            let renderCoords = [];
            for(let i = 0; i < state.points.length; i++) {
                const xRatio = i / (state.points.length - 1);
                const x = paddingLeft + (xRatio * graphWidth * state.scaleX) + state.offsetX;
                const yRatio = (state.points.length === 1) ? 0.5 : (state.points[i].price - minPrice) / priceRange;
                const y = paddingTop + (graphHeight * (1 - yRatio));
                renderCoords.push({ x: x, y: y, rawIdx: i });
            }
            
            const visibleCoords = renderCoords.filter(pt => pt.x >= paddingLeft - 10 && pt.x <= width - paddingRight + 10);
            if (visibleCoords.length === 0) return;

            ctx.save();
            ctx.beginPath();
            ctx.rect(paddingLeft, paddingTop, graphWidth, graphHeight);
            ctx.clip();

            ctx.beginPath();
            ctx.moveTo(visibleCoords[0].x, paddingTop + graphHeight);
            for(const pt of visibleCoords) {
                ctx.lineTo(pt.x, pt.y);
            }
            ctx.lineTo(visibleCoords[visibleCoords.length - 1].x, paddingTop + graphHeight);
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(0, paddingTop, 0, paddingTop + graphHeight);
            gradient.addColorStop(0, `${CHART_COLOR}33`); 
            gradient.addColorStop(1, `${CHART_COLOR}00`); 
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(visibleCoords[0].x, visibleCoords[0].y);
            for(let i = 1; i < visibleCoords.length; i++) {
                ctx.lineTo(visibleCoords[i].x, visibleCoords[i].y);
            }
            ctx.strokeStyle = CHART_COLOR;
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            if (state.hoverIndex !== -1 && renderCoords[state.hoverIndex]) {
                const activePt = renderCoords[state.hoverIndex];
                
                ctx.beginPath();
                ctx.moveTo(activePt.x, paddingTop);
                ctx.lineTo(activePt.x, paddingTop + graphHeight);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.beginPath();
                ctx.arc(activePt.x, activePt.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = CHART_COLOR;
                ctx.fill();
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.stroke();

                const activeData = state.points[state.hoverIndex];
                const timeOnly = activeData.timeStr.split(' ')[1] ? activeData.timeStr.split(' ')[1].substring(0, 5) : activeData.timeStr;
                const priceText = `$${activeData.price.toFixed(2)}`;
                
                // Replaced default UI font with JetBrains Mono for Tooltips
                ctx.font = "600 12px 'JetBrains Mono', monospace";
                const textWidth = Math.max(ctx.measureText(priceText).width, ctx.measureText(timeOnly).width) + 20;
                
                let boxX = activePt.x + 10;
                let boxY = activePt.y - 40;
                
                if (boxX + textWidth > width - paddingRight) boxX = activePt.x - textWidth - 10;
                if (boxY < paddingTop) boxY = activePt.y + 15;

                ctx.fillStyle = '#1C1C1E';
                ctx.beginPath();
                ctx.roundRect(boxX, boxY, textWidth, 40, 6);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.stroke();

                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'left';
                ctx.fillText(priceText, boxX + 10, boxY + 16);
                ctx.fillStyle = '#8E8E93';
                ctx.font = "400 11px 'JetBrains Mono', monospace";
                ctx.fillText(timeOnly, boxX + 10, boxY + 32);
            }

            ctx.restore(); 

            // Replaced default UI font with JetBrains Mono for Bottom Axis Timestamps
            ctx.fillStyle = '#8E8E93';
            ctx.textAlign = 'center';
            ctx.font = "600 11px 'JetBrains Mono', monospace";
            
            const numLabels = 6; 
            for(let i = 0; i <= numLabels; i++) {
                const visibleRatio = i / numLabels;
                const targetScreenX = paddingLeft + (visibleRatio * graphWidth);
                const targetDataRatio = ((targetScreenX - paddingLeft - state.offsetX) / state.scaleX) / graphWidth;
                
                let dataIdx = Math.round(targetDataRatio * (state.points.length - 1));
                
                if (dataIdx >= 0 && dataIdx < state.points.length) {
                    const fullTimeStr = state.points[dataIdx].timeStr; 
                    const timeOnly = fullTimeStr.split(' ')[1] ? fullTimeStr.split(' ')[1].substring(0, 5) : fullTimeStr;
                    ctx.fillText(timeOnly, targetScreenX, height - 10);
                }
            }
        }

        function updateClockAndStatus() {
            const now = new Date();
            const timeOptions = { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            
            DOM.clock.innerText = `Time: ${now.toLocaleTimeString('en-US', timeOptions)}`;

            const ctString = now.toLocaleString("en-US", { timeZone: "America/Chicago" });
            const ctDate = new Date(ctString);
            const day = ctDate.getDay(); 
            const hour = ctDate.getHours(); 
            const minute = ctDate.getMinutes(); 
            
            const timeInMinutes = (hour * 60) + minute;
            const marketOpen = (8 * 60) + 30; 
            const marketClose = 15 * 60;      
            
            let isMarketOpen = false;
            if (day !== 0 && day !== 6 && timeInMinutes >= marketOpen && timeInMinutes < marketClose) {
                isMarketOpen = true;
            }
            
            if (isMarketOpen) {
                DOM.status.innerHTML = `Live Tracking <span style="color: #28C76F; font-weight: 600;">(Market Open)</span>`;
            } else {
                DOM.status.innerHTML = `Live Tracking <span style="color: #BFBFBF; font-weight: 600;">(Market Closed)</span>`;
            }

            let targetDayOffset = 0;
            let targetMinutes = 0;
            let isClosing = false;
            
            if (day === 0) { targetDayOffset = 1; targetMinutes = marketOpen; } 
            else if (day === 6) { targetDayOffset = 2; targetMinutes = marketOpen; } 
            else { 
                if (timeInMinutes < marketOpen) { targetDayOffset = 0; targetMinutes = marketOpen; } 
                else if (timeInMinutes >= marketOpen && timeInMinutes < marketClose) { targetDayOffset = 0; targetMinutes = marketClose; isClosing = true; } 
                else { targetDayOffset = (day === 5) ? 3 : 1; targetMinutes = marketOpen; }
            }
            
            let diffMinutes = 0;
            if (targetDayOffset === 0) { diffMinutes = targetMinutes - timeInMinutes; } 
            else { diffMinutes = (24 * 60 - timeInMinutes) + ((targetDayOffset - 1) * 24 * 60) + targetMinutes; }
            
            const totalHrs = Math.floor(diffMinutes / 60);
            const diffMins = diffMinutes % 60;
            const diffDays = Math.floor(totalHrs / 24);
            const remainingHrs = totalHrs % 24;
            
            let timeString = "";
            if (diffDays > 0) { timeString = `${diffDays}d ${remainingHrs}h`; } 
            else if (remainingHrs > 0) { timeString = `${remainingHrs}h ${diffMins}m`; } 
            else { timeString = `${diffMins}m`; }
            
            if (isClosing) { DOM.countdown.innerText = `Market closes in ${timeString}`; } 
            else { DOM.countdown.innerText = `Market opens in ${timeString}`; }
        }

        setInterval(updateClockAndStatus, 1000);
        initializeTerminal();
        updateClockAndStatus(); 
        
        setInterval(() => {
            const isMacroMode = (currentTimeMode === 'range' && currentTimeValue !== '1D');
            if (!isMacroMode) fetchAndDrawNativeData();
        }, 60000);
    </script>
