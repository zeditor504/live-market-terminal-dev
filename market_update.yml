name: Daily At-Close Database Update

on:
  schedule:
    # Runs at 20:15 UTC (3:15 PM Central Daylight Time) Monday through Friday
    - cron: '15 20 * * 1-5'
  
  # This adds a "Run Workflow" button in GitHub so you can test it manually!
  workflow_dispatch: 

jobs:
  update-sheets:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install the required Python libraries
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Securely inject your Google Cloud credentials
      - name: Generate Credentials File
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > credentials.json

      # 5. Execute your exact Python script
      - name: Run Market Update Script
        run: |
          python bot.py
          
      # 6. Delete the credentials file immediately after for security
      - name: Clean up Credentials
        if: always()
        run: rm -f credentials.json