name: Live Market Pipeline

on:
  schedule:
    # Runs every 5 mins during 13:00-21:00 UTC (8:00 AM - 4:00 PM CT) Mon-Fri
    - cron: '*/5 13-21 * * 1-5'
  workflow_dispatch: 

jobs:
  update-database:
    runs-on: ubuntu-latest
    timeout-minutes: 3 # 🛑 ULTIMATE FAILSAFE: Kills hanging scripts to protect your monthly free quota

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python Engine
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth yfinance pandas pandas_market_calendars pytz

      - name: Inject Secure Google Credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Execute Backend Bot
        run: python bot.py

      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
        # 🛑 COMA PREVENTION: Prevents GitHub from turning off this automation after 60 days of inactivity