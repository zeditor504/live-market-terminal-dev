name: Live Market Pipeline

on:
  schedule:
    # Runs every 5 minutes during market hours (Mon-Fri, 13:00 - 21:00 UTC)
    - cron: '*/5 13-21 * * 1-5'
  workflow_dispatch: # Allows manual triggering from GitHub

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python Engine
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth yfinance pandas

      - name: Inject Secure Google Credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Execute Backend Bot
        run: python bot.py