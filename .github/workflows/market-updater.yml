name: End of Day Market Pipeline

on:
  schedule:
    # Runs at 5:00 PM Central Time (22:00 UTC) every Monday through Friday
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # Allows you to click a "Run manually" button on GitHub

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python Engine
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth yfinance pandas

      - name: Inject Secure Google Credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Execute Backend Bot
        run: python bot.py